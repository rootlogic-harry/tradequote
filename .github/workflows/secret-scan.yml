# Secret-scanning gate. Runs on every PR + every push to main.
#
# We use gitleaks because:
#   - works on private repos without a paid GHAS licence
#   - explicit ruleset (auditable, in .gitleaks.toml if we ever need to
#     customise)
#   - catches accidental commits of Stripe live keys, Anthropic / OpenAI
#     keys, DATABASE_URL, Google OAuth secrets, generic API tokens
#
# This complements the secrets policy in docs/SECRETS.md — that doc is
# the source-of-truth narrative; this workflow is the enforcer.
#
# Scope:
#   - PR scan:  audits the diff (fast, runs on every PR open / push)
#   - Branch scan: full-history audit on every push to main, catches
#     anything that might have slipped before this workflow existed
#
# Behaviour: a finding fails the workflow → branch protection blocks
# the merge → no agent commit can land a key without trying very hard.

name: secret-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly safety net — catches a key that was somehow committed and
    # not detected (e.g. via a force-push that bypassed the per-PR scan).
    # Sundays at 03:30 UTC.
    - cron: '30 3 * * 0'
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 lets gitleaks audit the full history on push.
          # PR runs default to a shallow checkout — the action handles
          # diff-only scanning automatically there.
          fetch-depth: ${{ github.event_name == 'push' && 0 || 1 }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITLEAKS_LICENSE is only needed for org-paid features; the
          # basic detect path is free for solo / small repos.
          # GITLEAKS_NOTIFY_USER_LIST is left blank so a finding doesn't
          # @-mention anyone in the PR comment (Harry is the only
          # human in this repo).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
