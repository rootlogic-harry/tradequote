<!DOCTYPE html>
<!-- `app-chrome` class scopes the visibility-hiding print rules in
     public/print.css so they only apply inside the app shell. The
     Puppeteer server-side HTML (no chrome) omits this class so the
     quote content stays in normal flow and paginates correctly. -->
<html lang="en" class="app-chrome">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastQuote — Professional Quotes for Tradespeople</title>
  <meta name="description" content="Generate professional construction quotes in under 5 minutes. Upload photos, describe the job, get your quote." />
  <meta name="theme-color" content="#e8a838" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <!-- TRQ-131: trader-side Client Portal styles (.link-block-* +
       .portal-badge-*). Extracted from the designer's client-portal.css
       so the customer-facing portal CSS stays server-only. -->
  <link rel="stylesheet" href="/trader-portal.css?v=1" />

  <!-- Anti-flash: set theme before anything renders -->
  <script>
    (function() {
      var userId = sessionStorage.getItem('tq_last_user');
      var theme = userId ? localStorage.getItem('tq_theme_' + userId) : null;
      document.documentElement.setAttribute('data-theme', theme || 'light');
    })();
  </script>

  <style>
    /* ── Light theme ── */
    :root,
    [data-theme="light"] {
      --tq-bg:          #f5f1eb;
      --tq-surface:     #ede8de;
      --tq-card:        #ffffff;
      --tq-border:      #d4cfc4;
      --tq-border-soft: #e8e3da;

      --tq-text:        #1a1714;
      --tq-muted:       #7a6f5e;
      --tq-hint:        #9a8f7e;

      --tq-accent:      #d97706;
      --tq-accent-dk:   #b45309;
      --tq-accent-bg:   #fef8ee;
      --tq-accent-bd:   #e8c870;

      --tq-brand:       var(--tq-accent);
      --tq-border-strong: var(--tq-text);
      --tq-ok:          #2d7a4f;
      --tq-warn:        #c27a0f;
      --tq-err:         #9c2d2d;

      --tq-nav-bg:      #1a1714;
      --tq-nav-text:    #f5f0e8;
      --tq-nav-muted:   #8a8070;
      --tq-nav-active:  #2d2a24;

      --tq-rail-bg:     #1a1714;

      --tq-confirmed-bg:  #f0faf4;
      --tq-confirmed-bd:  #6dbf8a;
      --tq-confirmed-txt: #1a6b35;

      --tq-unconf-bg:   #fef8ee;
      --tq-unconf-bd:   #fac750;
      --tq-unconf-txt:  #a06010;

      --tq-error-bg:    #fef0f0;
      --tq-error-bd:    #f09090;
      --tq-error-txt:   #a02020;

      --tq-status-sent:     #fef3e0;
      --tq-status-sent-txt: #a06010;
      --tq-status-acc:      #e6f5ec;
      --tq-status-acc-txt:  #1a6b35;
      --tq-status-draft:    #ede9e0;
      --tq-status-draft-txt:#7a6f5e;

      /* legacy compat aliases */
      --tq-accent-dark: var(--tq-accent-dk);
      --tq-confirmed:   var(--tq-confirmed-bd);
      --tq-unconfirmed: var(--tq-unconf-bd);
      --tq-error:       var(--tq-error-txt);
    }

    /* ── Dark theme ── */
    [data-theme="dark"] {
      --tq-bg:          #18170f;
      --tq-surface:     #201e13;
      --tq-card:        #27251a;
      --tq-border:      #3d3a28;
      --tq-border-soft: #302e20;

      --tq-text:        #f5f0e8;
      --tq-muted:       #8a8070;
      --tq-hint:        #6a6050;

      --tq-accent:      #e8a838;
      --tq-accent-dk:   #c8881a;
      --tq-accent-bg:   #2a2010;
      --tq-accent-bd:   #6a5020;

      --tq-brand:       var(--tq-accent);
      --tq-border-strong: var(--tq-text);
      --tq-ok:          #6dbf8a;
      --tq-warn:        #e8a838;
      --tq-err:         #f09090;

      --tq-nav-bg:      #0f0e09;
      --tq-nav-text:    #f5f0e8;
      --tq-nav-muted:   #6a6050;
      --tq-nav-active:  #1e1c12;

      --tq-rail-bg:     #0f0e09;

      --tq-confirmed-bg:  #0f2018;
      --tq-confirmed-bd:  #2a6040;
      --tq-confirmed-txt: #6dbf8a;

      --tq-unconf-bg:   #28200a;
      --tq-unconf-bd:   #8a6020;
      --tq-unconf-txt:  #e8a838;

      --tq-error-bg:    #280e0e;
      --tq-error-bd:    #8a2020;
      --tq-error-txt:   #f09090;

      --tq-status-sent:     #28200a;
      --tq-status-sent-txt: #e8a838;
      --tq-status-acc:      #0f2018;
      --tq-status-acc-txt:  #6dbf8a;
      --tq-status-draft:    #201e13;
      --tq-status-draft-txt:#8a8070;

      /* legacy compat aliases */
      --tq-accent-dark: var(--tq-accent-dk);
      --tq-confirmed:   var(--tq-confirmed-bd);
      --tq-unconfirmed: var(--tq-unconf-bd);
      --tq-error:       var(--tq-error-txt);
    }

    body {
      background-color: var(--tq-bg);
      color: var(--tq-text);
      font-family: 'Inter', sans-serif;
    }

    @keyframes slide-in {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }
    .animate-slide-in {
      animation: slide-in 0.2s ease-out;
    }

    /* ── Component primitives ── */
    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      /* Fluid scaling: 28px on a 320px phone, 56px on desktop ≥933px.
         Replaces the static 56px which forced trader screens to wrap
         their <h2 className="page-title"> in a hard fontSize override. */
      font-size: clamp(28px, 6vw, 56px);
      line-height: 1.05;
      color: var(--tq-text);
    }
    .eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--tq-muted);
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      padding: 0 24px;
      border-radius: 2px;
      border: none;
      background: var(--tq-accent);
      color: #ffffff;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .btn-primary:hover { background: var(--tq-accent-dk); }
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      padding: 0 24px;
      border-radius: 2px;
      border: 1.5px solid var(--tq-border);
      background: transparent;
      color: var(--tq-text);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--tq-accent); color: var(--tq-accent); }

    /* Native <summary> disclosure triangle suppression. Tailwind's
       list-none handles modern browsers via list-style; this rule
       covers older Safari (<16) that still emits ::-webkit-details-marker. */
    summary::-webkit-details-marker { display: none; }
    /* Compact action button for table-row contexts (Saved Quotes,
       Dashboard incomplete jobs). Density-friendly on desktop (36px,
       inline). On mobile, becomes a full-width 44px row so multiple
       state changes (Mark Sent, Accept, Decline, Complete, Delete)
       stack as touchable rows instead of getting wrapped & squashed. */
    .row-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 36px;
      padding: 0 16px;
      border-radius: 2px;
      border: 1.5px solid var(--tq-border);
      background: transparent;
      color: var(--tq-text);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background-color 0.15s;
    }
    .row-action-btn:hover:not(:disabled) {
      border-color: var(--tq-accent);
      color: var(--tq-accent);
    }
    .row-action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    @media (max-width: 899px) {
      .row-action-btn {
        height: 44px;
        width: 100%;
        font-size: 13px;
      }
    }
    .pill {
      display: inline-flex;
      align-items: center;
      /* Touch-friendly on mobile (Apple HIG = 44px min); compact on
         desktop where the cursor is precise. */
      height: 36px;
      padding: 0 14px;
      border-radius: 2px;
      border: 1.5px solid var(--tq-border);
      background: transparent;
      color: var(--tq-muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background-color 0.15s;
    }
    @media (max-width: 899px) {
      .pill { height: 40px; padding: 0 16px; }
    }
    .pill:hover { border-color: var(--tq-accent); color: var(--tq-accent); }
    .pill.active {
      border-color: var(--tq-accent);
      background: var(--tq-accent);
      color: #ffffff;
    }
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: var(--tq-nav-bg);
      border-radius: 2px;
      overflow: hidden;
    }
    .stats-strip .stat-cell {
      padding: 16px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .stats-strip .stat-cell:last-child { border-right: none; }
    .stats-strip .stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--tq-nav-muted);
      margin-bottom: 4px;
    }
    .stats-strip .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--tq-nav-text);
    }
    /* Mobile: 4 stat cells in 375px gives 93px each — money values
       overflow ("£12,500"). Re-flow as 2×2 grid below the fq breakpoint
       and rebuild borders so the inner cross stays visible. */
    @media (max-width: 899px) {
      .stats-strip {
        grid-template-columns: repeat(2, 1fr);
      }
      .stats-strip .stat-cell {
        padding: 12px 8px;
        border-right: 1px solid rgba(255,255,255,0.08);
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .stats-strip .stat-cell:nth-child(2n) { border-right: none; }
      .stats-strip .stat-cell:nth-last-child(-n+2) { border-bottom: none; }
      .stats-strip .stat-value { font-size: 18px; }
    }
    /* Stat-value compact/full toggle (Dashboard.jsx renders both forms).
       Default: full visible, compact hidden. On very-small viewports
       (<360px, e.g. iPhone SE / older Androids) flip the visibility so
       7-figure year totals (£1,200,000) render as their abbreviated
       form (£1.2M) and don't overflow the ~165px stat cell. Audit #19. */
    .stat-value-full { display: inline; }
    .stat-value-compact { display: none; }
    @media (max-width: 359px) {
      .stat-value-full { display: none; }
      .stat-value-compact { display: inline; }
    }
    .job-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--tq-card);
      border: 1.5px solid var(--tq-border);
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    /* Mobile: a 375px row can't hold ref+badges+name+amount+actions in
       a single line. Stack content vertically so each block is full-
       width and readable. flex-col is applied via the React variant
       (`flex-col fq:flex-row`); these styles snug the padding + gap. */
    @media (max-width: 899px) {
      .job-row {
        gap: 12px;
        padding: 14px;
        align-items: stretch;
      }
    }
    .job-row:hover { border-color: var(--tq-accent); }
    .jr-ref {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--tq-accent);
    }
    .jr-stamp {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 2px;
    }
    .jr-stamp[data-status="draft"] { background: var(--tq-status-draft); color: var(--tq-status-draft-txt); }
    .jr-stamp[data-status="sent"] { background: var(--tq-status-sent); color: var(--tq-status-sent-txt); }
    .jr-stamp[data-status="accepted"] { background: var(--tq-status-acc); color: var(--tq-status-acc-txt); }
    .jr-stamp[data-status="declined"] { background: var(--tq-error-bg); color: var(--tq-error-txt); }
    .jr-stamp[data-status="completed"] { background: var(--tq-confirmed-bg); color: var(--tq-confirmed-txt); }
    .photo-slot {
      aspect-ratio: 4/3;
      border: 1.5px dashed var(--tq-border);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s;
      background: var(--tq-surface);
    }
    .photo-slot:hover { border-color: var(--tq-accent); }
    .photo-slot.required { border-top: 3px solid var(--tq-accent); }
    .nq-field {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border-radius: 2px;
      border: 1.5px solid var(--tq-border);
      background: var(--tq-card);
      color: var(--tq-text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.15s;
    }
    .nq-field:focus { outline: none; border-color: var(--tq-accent); }
    .nq-field::placeholder { color: var(--tq-hint); }
    textarea.nq-field {
      padding: 12px 14px;
      height: auto;
      min-height: 48px;
      line-height: 1.4;
    }
    /* Forward-compat utility: opt-in 44px minimum touch target. Reserved
       in the touch-target lint (PR #69) and now defined here so callers
       can apply `.touch-44` to elements that don't fit any existing
       button class (small × / + buttons, inline icon buttons, etc.). */
    .touch-44 {
      min-height: 44px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .rv-measure {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--tq-card);
      border: 1.5px solid var(--tq-border);
      border-radius: 2px;
      transition: border-color 0.15s;
    }
    .rv-measure.confirmed {
      border-color: var(--tq-confirmed-bd);
      background: var(--tq-confirmed-bg);
    }

    /* ── Dashboard redesign (2026-06-29) ──
       Money-first stats, single-action rows, flagged-row amber bar,
       side-rail quota chip. Mapped onto the existing --tq-* token
       vocabulary — no new palette introduced. See
       /tmp/fastquote-dashboard-handoff/design_handoff_dashboard/
       for the source-of-truth prototype. */

    /* Won/Awaiting/Pipeline/Win-rate strip — replaces the old
       This-month/This-year/Awaiting/Accepted strip. Keeps the dark
       canvas of .stats-strip so the visual frame is unchanged; only
       the cell content + accent vocab is new. */
    .stats-strip .stat-cell.accent .stat-label { color: var(--tq-confirmed-bd); }
    .stats-strip .stat-cell.accent .stat-value { color: var(--tq-confirmed-bd); }
    .stats-strip .stat-cell.warn { background: linear-gradient(180deg, rgba(217,119,6,0.18), transparent); }
    .stats-strip .stat-cell.warn .stat-label { color: var(--tq-accent); }
    .stats-strip .stat-cell.warn .stat-value { color: var(--tq-accent); }
    .stats-strip .stat-sub {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: var(--tq-nav-muted);
      margin-top: 6px;
    }
    .stats-strip .stat-link {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--tq-accent);
      background: none;
      border: none;
      padding: 6px 0 0;
      cursor: pointer;
      min-height: 44px;
    }
    .stats-strip .stat-link:hover { color: var(--tq-nav-text); }

    /* Flagged job row — amber inset bar marking rows that need user
       attention (sent ≥2d with no reply OR accepted with no RAMS).
       inset box-shadow doesn't shift layout. */
    .job-row.flagged { box-shadow: inset 4px 0 0 var(--tq-accent); }
    .job-flag {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--tq-accent-dk);
      background: var(--tq-accent-bg);
      padding: 2px 7px;
      border-radius: 2px;
      margin-top: 6px;
    }

    /* Kebab overflow button + menu */
    .kebab-btn {
      width: 36px;
      height: 36px;
      border-radius: 2px;
      border: 1.5px solid var(--tq-border);
      background: var(--tq-card);
      color: var(--tq-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .kebab-btn:hover { border-color: var(--tq-accent); color: var(--tq-text); }
    @media (max-width: 899px) {
      .kebab-btn { width: 44px; height: 44px; }
    }
    .kebab-menu-wrap { position: relative; }
    .kebab-menu {
      position: absolute;
      right: 0;
      top: 40px;
      z-index: 30;
      background: var(--tq-card);
      border: 1.5px solid var(--tq-border);
      border-radius: 2px;
      box-shadow: 0 16px 40px -12px rgba(0,0,0,0.32);
      min-width: 200px;
      overflow: hidden;
      padding: 4px;
    }
    .kebab-menu button {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: none;
      background: none;
      color: var(--tq-text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      border-radius: 2px;
      cursor: pointer;
      min-height: 44px;
    }
    .kebab-menu button:hover { background: var(--tq-surface); }
    .kebab-menu button.danger { color: var(--tq-error-txt); }
    .kebab-menu button.danger:hover { background: var(--tq-error-bg); }
    .kebab-menu-div {
      height: 1px;
      background: var(--tq-border);
      margin: 4px 0;
    }

    /* Side-rail quota chip — moved from the top-of-page QuotaCounter
       (kept for Step pages + SavedQuotes; Dashboard only loses the
       inline banner). Amber tint kicks in at quota <= 2. Hidden
       entirely for subscribed / comped — no useful info there. */
    .rail-quota {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 11px;
      border-radius: 2px;
      background: rgba(255,255,255,0.04);
      margin: 0 4px 12px;
    }
    .rail-quota.low {
      background: rgba(217,119,6,0.16);
      outline: 1px solid rgba(217,119,6,0.4);
    }
    .rail-quota-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--tq-nav-text);
      font-weight: 500;
    }
    .rail-quota.low .rail-quota-count { color: #f6c98a; }
    .rail-quota-topup {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--tq-accent);
      background: none;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      min-height: 44px;
    }
    .rail-quota-topup:hover { color: var(--tq-nav-text); }

    /* Recent-jobs row redesign — desktop uses an aligned grid so
       value / action / ⋯ form clean vertical lines. Mobile reflows
       per the prototype's @media block: status stamp full width,
       client/site fills middle, primary action full-width, ref + £
       on the right. */
    .job-row.job-row-redesign {
      display: grid;
      grid-template-columns: 100px 1fr 140px 160px 44px;
      gap: 16px;
      align-items: center;
      padding: 16px 20px;
    }
    .job-row-stamp {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .job-row-stamp::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 2px;
      background: currentColor;
      display: inline-block;
      flex-shrink: 0;
    }
    .job-row-stamp[data-s="draft"] { color: var(--tq-muted); }
    .job-row-stamp[data-s="sent"] { color: var(--tq-accent); }
    .job-row-stamp[data-s="accepted"] { color: var(--tq-confirmed-txt); }
    .job-row-stamp[data-s="completed"] { color: var(--tq-muted); }

    /* ── Your Quote screen redesign (2026-06-29) ──
       /tmp/fastquote-quote-handoff/design_handoff_dashboard/FastQuote Quote Screen Spec.md
       Replaces the PR #73 Download / Send / More 6-button layout with
       2 split-buttons + 1 tertiary text link, a state-aware status
       banner, and a promoted hero client-link card. Mapped onto the
       existing --tq-* token vocabulary — no new palette. */
    .qo-screen { display: flex; flex-direction: column; gap: 16px; }
    .qo-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .qo-header-text { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .qo-back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--tq-muted);
      background: none;
      border: none;
      padding: 8px 0;
      cursor: pointer;
      align-self: flex-start;
      transition: color 0.15s;
    }
    .qo-back-link:hover { color: var(--tq-accent); }
    .qo-title { margin: 0; }
    .qo-ref {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--tq-muted);
      margin-top: 8px;
    }
    .qo-ref-num { color: var(--tq-accent); }
    .qo-ref-sep { color: var(--tq-muted); }
    .qo-subtitle {
      font-size: 14.5px;
      color: var(--tq-muted);
      margin: 4px 0 0;
    }

    /* Status banner — state-dependent strip above the action region.
       Tokens reused from the existing status palette so dark/light
       themes flip cleanly. */
    .qo-status {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 14px 16px;
      border-radius: 2px;
      border: 1.5px solid var(--tq-border);
      background: var(--tq-status-draft);
    }
    .qo-status-ic {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: var(--tq-muted);
      flex-shrink: 0;
    }
    .qo-status-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .qo-status-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }
    .qo-status-sub {
      font-size: 13px;
      color: var(--tq-muted);
      line-height: 1.35;
    }
    .qo-status--accepted {
      background: var(--tq-status-acc);
      border-color: var(--tq-confirmed-bd);
    }
    .qo-status--accepted .qo-status-ic { background: var(--tq-confirmed-bd); }
    .qo-status--accepted .qo-status-title { color: var(--tq-confirmed-txt); }
    .qo-status--declined {
      background: var(--tq-error-bg);
      border-color: var(--tq-error-bd);
    }
    .qo-status--declined .qo-status-ic { background: var(--tq-err); }
    .qo-status--declined .qo-status-title { color: var(--tq-error-txt); }
    .qo-status--sent,
    .qo-status--viewed {
      background: var(--tq-status-sent);
      border-color: var(--tq-accent-bd);
    }
    .qo-status--sent .qo-status-ic,
    .qo-status--viewed .qo-status-ic { background: var(--tq-accent); }
    .qo-status--sent .qo-status-title,
    .qo-status--viewed .qo-status-title { color: var(--tq-status-sent-txt); }
    .qo-status--draft .qo-status-title { color: var(--tq-muted); }

    /* Action region — 2 split-buttons + 1 tertiary ghost link. */
    .qo-actions {
      display: flex;
      gap: 12px;
      align-items: stretch;
      flex-wrap: wrap;
    }
    .qo-actions .qo-split { flex-shrink: 0; }
    .qo-edit-link { margin-left: auto; align-self: center; }
    @media (max-width: 899px) {
      .qo-actions { flex-direction: column; align-items: stretch; }
      .qo-actions .qo-split,
      .qo-actions .qo-edit-link { width: 100%; margin-left: 0; }
    }

    /* Split-button — main click + caret dropdown. The caret only carries
       a left border separator; the main and caret share the same
       background/border so they read as one component. */
    .qo-split {
      display: inline-flex;
      position: relative;
      align-items: stretch;
    }
    .qo-split-main {
      border-radius: 2px 0 0 2px;
      padding-left: 18px;
      padding-right: 16px;
    }
    .qo-split-caret {
      border-radius: 0 2px 2px 0;
      padding: 0 12px;
      min-width: 0;
      border-left: 1px solid rgba(255, 255, 255, 0.25);
    }
    .qo-split--secondary .qo-split-caret {
      border-left: 1.5px solid var(--tq-border);
    }
    .qo-split--secondary .qo-split-main {
      border-right: none;
    }
    .qo-split-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      z-index: 30;
      background: var(--tq-card);
      border: 1.5px solid var(--tq-border);
      border-radius: 2px;
      box-shadow: 0 16px 40px -12px rgba(0, 0, 0, 0.32);
      min-width: 240px;
      padding: 6px;
    }
    @media (max-width: 899px) {
      .qo-split-menu {
        position: static;
        width: 100%;
        margin-top: 6px;
        box-shadow: none;
      }
    }
    .qo-split-menu-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--tq-muted);
      padding: 8px 12px 5px;
    }
    .qo-split-menu-item {
      display: flex;
      width: 100%;
      align-items: flex-start;
      gap: 11px;
      padding: 11px 12px;
      border: none;
      background: none;
      color: var(--tq-text);
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      text-align: left;
      border-radius: 2px;
      cursor: pointer;
      min-height: 44px;
    }
    .qo-split-menu-item:hover { background: var(--tq-surface); }
    .qo-split-menu-item svg { flex-shrink: 0; margin-top: 2px; color: var(--tq-muted); }
    .qo-split-menu-item-text { display: flex; flex-direction: column; gap: 2px; }
    .qo-split-menu-item-label { font-weight: 600; color: var(--tq-text); }
    .qo-split-menu-item-sub { font-size: 11.5px; color: var(--tq-muted); }

    /* Hero client-link card — promoted from the buried dark box. */
    .qo-hero-card {
      background: var(--tq-card);
      border: 1.5px solid var(--tq-border);
      border-top: 4px solid var(--tq-accent);
      border-radius: 2px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .qo-hero-card--accepted { border-top-color: var(--tq-confirmed-bd); }
    .qo-hero-card--declined { border-top-color: var(--tq-err); }
    .qo-hero-card--viewed,
    .qo-hero-card--sent { border-top-color: var(--tq-accent); }
    .qo-hero-card--pre { border-top-color: var(--tq-border); }
    .qo-hero-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .qo-hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--tq-text);
    }
    .qo-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      background: var(--tq-surface);
      color: var(--tq-muted);
    }
    .qo-status-badge i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      display: inline-block;
    }
    .qo-status-badge--accepted { background: var(--tq-status-acc); color: var(--tq-confirmed-txt); }
    .qo-status-badge--viewed,
    .qo-status-badge--sent { background: var(--tq-status-sent); color: var(--tq-status-sent-txt); }
    .qo-status-badge--declined { background: var(--tq-error-bg); color: var(--tq-error-txt); }
    .qo-status-badge--expired { background: var(--tq-surface); color: var(--tq-muted); }
    .qo-status-badge--draft { background: var(--tq-surface); color: var(--tq-muted); }
    .qo-hero-sub {
      font-size: 13px;
      color: var(--tq-muted);
      line-height: 1.4;
      margin: 0;
    }
    .qo-link-url {
      display: flex;
      align-items: stretch;
      border: 1.5px solid var(--tq-border);
      border-radius: 2px;
      overflow: hidden;
    }
    .qo-link-url input {
      flex: 1;
      min-width: 0;
      border: none;
      background: var(--tq-surface);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--tq-text);
      padding: 11px 12px;
      outline: none;
    }
    .qo-link-url-copy {
      border: none;
      border-left: 1.5px solid var(--tq-border);
      background: var(--tq-card);
      color: var(--tq-text);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0 18px;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }
    .qo-link-url-copy:hover { background: var(--tq-accent); color: #ffffff; }
    .qo-link-url-copy--copied { background: var(--tq-confirmed-bg); color: var(--tq-confirmed-txt); }

    /* Timeline — Sent → Viewed → Accepted, horizontal on desktop,
       vertical stack on mobile. */
    .qo-timeline {
      list-style: none;
      margin: 6px 0 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .qo-tl {
      position: relative;
      padding-top: 22px;
      padding-right: 16px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .qo-tl-dot {
      position: absolute;
      top: 0;
      left: 0;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid var(--tq-border);
      box-shadow: 0 0 0 1px var(--tq-border);
      z-index: 1;
    }
    .qo-tl::before {
      content: "";
      position: absolute;
      top: 6px;
      left: 16px;
      right: 8px;
      height: 2px;
      background: var(--tq-border);
    }
    .qo-tl:last-child::before { display: none; }
    .qo-tl--done .qo-tl-dot {
      background: var(--tq-confirmed-bd);
      border-color: var(--tq-confirmed-bd);
      box-shadow: 0 0 0 1px var(--tq-confirmed-bd);
    }
    .qo-tl--done::before { background: var(--tq-confirmed-bd); }
    .qo-tl--declined .qo-tl-dot {
      background: var(--tq-err);
      border-color: var(--tq-err);
      box-shadow: 0 0 0 1px var(--tq-err);
    }
    .qo-tl--declined::before { background: var(--tq-err); }
    .qo-tl-k {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--tq-text);
    }
    .qo-tl-t {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      color: var(--tq-muted);
    }
    .qo-tl--pending .qo-tl-k { color: var(--tq-muted); }
    @media (max-width: 899px) {
      .qo-timeline { grid-template-columns: 1fr; }
      .qo-tl { padding-top: 0; padding-left: 24px; padding-bottom: 12px; }
      .qo-tl-dot { top: 2px; left: 0; }
      .qo-tl::before {
        top: 16px;
        left: 6px;
        right: auto;
        bottom: 0;
        width: 2px;
        height: auto;
      }
      .qo-tl:last-child::before { display: none; }
    }

    .qo-decline-reason {
      padding: 10px 12px;
      background: var(--tq-error-bg);
      border: 1px solid var(--tq-error-bd);
      color: var(--tq-text);
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-radius: 2px;
    }
    .qo-decline-reason-k {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--tq-muted);
    }
    .qo-hero-expiry {
      font-size: 12px;
      color: var(--tq-muted);
    }
    .qo-hero-regen {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 12px;
      border-top: 1px solid var(--tq-border-soft);
    }
    .qo-hero-regen-txt {
      font-size: 12px;
      color: var(--tq-muted);
    }
    .qo-hero-regen-btn {
      background: none;
      border: none;
      color: var(--tq-accent);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 8px 4px;
      min-height: 44px;
    }
    .qo-hero-regen-btn:hover { color: var(--tq-accent-dk); }
    .qo-hero-regen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* "More actions" disclosure — discreet inline expansion, native
       <details>/<summary>. Same pattern as PR #83's fix: keep
       .btn-ghost on an inner span so the click-toggle stays reliable
       across Chrome and Safari. */
    .qo-extras-summary { list-style: none; }
    .qo-extras-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    /* Slim "Full quote document" strip + Preview button. */
    .qo-doc-strip {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--tq-card);
      border: 1.5px solid var(--tq-border);
      border-radius: 2px;
      padding: 14px 16px;
    }
    .qo-doc-thumb {
      width: 44px;
      height: 56px;
      border-radius: 2px;
      background: #ffffff;
      border: 1px solid var(--tq-border-soft);
      box-shadow: 0 4px 10px -6px rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
      padding: 7px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .qo-doc-thumb i {
      height: 3px;
      background: var(--tq-border);
      border-radius: 1px;
    }
    .qo-doc-thumb i.a {
      background: var(--tq-accent);
      width: 62%;
    }
    .qo-doc-strip-text { flex: 1; min-width: 0; }
    .qo-doc-strip-head {
      font-weight: 600;
      font-size: 14px;
      color: var(--tq-text);
    }
    .qo-doc-strip-sub {
      font-size: 12.5px;
      color: var(--tq-muted);
      margin-top: 2px;
    }
