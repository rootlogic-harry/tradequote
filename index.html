<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastQuote — Professional Quotes for Tradespeople</title>
  <meta name="description" content="Generate professional construction quotes in under 5 minutes. Upload photos, describe the job, get your quote." />
  <meta name="theme-color" content="#e8a838" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <!-- Anti-flash: set theme before anything renders -->
  <script>
    (function() {
      var userId = sessionStorage.getItem('tq_last_user');
      var theme = userId ? localStorage.getItem('tq_theme_' + userId) : null;
      document.documentElement.setAttribute('data-theme', theme || 'light');
    })();
  </script>

  <style>
    /* ── Light theme ── */
    :root,
    [data-theme="light"] {
      --tq-bg:          #f5f1eb;
      --tq-surface:     #ede8de;
      --tq-card:        #ffffff;
      --tq-border:      #d4cfc4;
      --tq-border-soft: #e8e3da;

      --tq-text:        #1a1714;
      --tq-muted:       #7a6f5e;
      --tq-hint:        #9a8f7e;

      --tq-accent:      #d97706;
      --tq-accent-dk:   #b45309;
      --tq-accent-bg:   #fef8ee;
      --tq-accent-bd:   #e8c870;

      --tq-brand:       var(--tq-accent);
      --tq-border-strong: var(--tq-text);
      --tq-ok:          #2d7a4f;
      --tq-warn:        #c27a0f;
      --tq-err:         #9c2d2d;

      --tq-nav-bg:      #1a1714;
      --tq-nav-text:    #f5f0e8;
      --tq-nav-muted:   #8a8070;
      --tq-nav-active:  #2d2a24;

      --tq-rail-bg:     #1a1714;

      --tq-confirmed-bg:  #f0faf4;
      --tq-confirmed-bd:  #6dbf8a;
      --tq-confirmed-txt: #1a6b35;

      --tq-unconf-bg:   #fef8ee;
      --tq-unconf-bd:   #fac750;
      --tq-unconf-txt:  #a06010;

      --tq-error-bg:    #fef0f0;
      --tq-error-bd:    #f09090;
      --tq-error-txt:   #a02020;

      --tq-status-sent:     #fef3e0;
      --tq-status-sent-txt: #a06010;
      --tq-status-acc:      #e6f5ec;
      --tq-status-acc-txt:  #1a6b35;
      --tq-status-draft:    #ede9e0;
      --tq-status-draft-txt:#7a6f5e;

      /* legacy compat aliases */
      --tq-accent-dark: var(--tq-accent-dk);
      --tq-confirmed:   var(--tq-confirmed-bd);
      --tq-unconfirmed: var(--tq-unconf-bd);
      --tq-error:       var(--tq-error-txt);
    }

    /* ── Dark theme ── */
    [data-theme="dark"] {
      --tq-bg:          #18170f;
      --tq-surface:     #201e13;
      --tq-card:        #27251a;
      --tq-border:      #3d3a28;
      --tq-border-soft: #302e20;

      --tq-text:        #f5f0e8;
      --tq-muted:       #8a8070;
      --tq-hint:        #6a6050;

      --tq-accent:      #e8a838;
      --tq-accent-dk:   #c8881a;
      --tq-accent-bg:   #2a2010;
      --tq-accent-bd:   #6a5020;

      --tq-brand:       var(--tq-accent);
      --tq-border-strong: var(--tq-text);
      --tq-ok:          #6dbf8a;
      --tq-warn:        #e8a838;
      --tq-err:         #f09090;

      --tq-nav-bg:      #0f0e09;
      --tq-nav-text:    #f5f0e8;
      --tq-nav-muted:   #6a6050;
      --tq-nav-active:  #1e1c12;

      --tq-rail-bg:     #0f0e09;

      --tq-confirmed-bg:  #0f2018;
      --tq-confirmed-bd:  #2a6040;
      --tq-confirmed-txt: #6dbf8a;

      --tq-unconf-bg:   #28200a;
      --tq-unconf-bd:   #8a6020;
      --tq-unconf-txt:  #e8a838;

      --tq-error-bg:    #280e0e;
      --tq-error-bd:    #8a2020;
      --tq-error-txt:   #f09090;

      --tq-status-sent:     #28200a;
      --tq-status-sent-txt: #e8a838;
      --tq-status-acc:      #0f2018;
      --tq-status-acc-txt:  #6dbf8a;
      --tq-status-draft:    #201e13;
      --tq-status-draft-txt:#8a8070;

      /* legacy compat aliases */
      --tq-accent-dark: var(--tq-accent-dk);
      --tq-confirmed:   var(--tq-confirmed-bd);
      --tq-unconfirmed: var(--tq-unconf-bd);
      --tq-error:       var(--tq-error-txt);
    }

    body {
      background-color: var(--tq-bg);
      color: var(--tq-text);
      font-family: 'Inter', sans-serif;
    }

    @keyframes slide-in {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }
    .animate-slide-in {
      animation: slide-in 0.2s ease-out;
    }

    /* ── Component primitives ── */
    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 56px;
      line-height: 1;
      color: var(--tq-text);
    }
    .eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--tq-muted);
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      padding: 0 24px;
      border-radius: 2px;
      border: none;
      background: var(--tq-accent);
      color: #ffffff;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .btn-primary:hover { background: var(--tq-accent-dk); }
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      padding: 0 24px;
      border-radius: 2px;
      border: 1.5px solid var(--tq-border);
      background: transparent;
      color: var(--tq-text);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--tq-accent); color: var(--tq-accent); }
    .pill {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 14px;
      border-radius: 2px;
      border: 1.5px solid var(--tq-border);
      background: transparent;
      color: var(--tq-muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background-color 0.15s;
    }
    .pill:hover { border-color: var(--tq-accent); color: var(--tq-accent); }
    .pill.active {
      border-color: var(--tq-accent);
      background: var(--tq-accent);
      color: #ffffff;
    }
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: var(--tq-nav-bg);
      border-radius: 2px;
      overflow: hidden;
    }
    .stats-strip .stat-cell {
      padding: 16px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .stats-strip .stat-cell:last-child { border-right: none; }
    .stats-strip .stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--tq-nav-muted);
      margin-bottom: 4px;
    }
    .stats-strip .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--tq-nav-text);
    }
    .job-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--tq-card);
      border: 1.5px solid var(--tq-border);
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .job-row:hover { border-color: var(--tq-accent); }
    .jr-ref {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--tq-accent);
    }
    .jr-stamp {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 2px;
    }
    .jr-stamp[data-status="draft"] { background: var(--tq-status-draft); color: var(--tq-status-draft-txt); }
    .jr-stamp[data-status="sent"] { background: var(--tq-status-sent); color: var(--tq-status-sent-txt); }
    .jr-stamp[data-status="accepted"] { background: var(--tq-status-acc); color: var(--tq-status-acc-txt); }
    .jr-stamp[data-status="declined"] { background: var(--tq-error-bg); color: var(--tq-error-txt); }
    .jr-stamp[data-status="completed"] { background: var(--tq-confirmed-bg); color: var(--tq-confirmed-txt); }
    .photo-slot {
      aspect-ratio: 4/3;
      border: 1.5px dashed var(--tq-border);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s;
      background: var(--tq-surface);
    }
    .photo-slot:hover { border-color: var(--tq-accent); }
    .photo-slot.required { border-top: 3px solid var(--tq-accent); }
    .nq-field {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border-radius: 2px;
      border: 1.5px solid var(--tq-border);
      background: var(--tq-card);
      color: var(--tq-text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.15s;
    }
    .nq-field:focus { outline: none; border-color: var(--tq-accent); }
    .nq-field::placeholder { color: var(--tq-hint); }
    .rv-measure {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--tq-card);
      border: 1.5px solid var(--tq-border);
      border-radius: 2px;
      transition: border-color 0.15s;
    }
    .rv-measure.confirmed {
      border-color: var(--tq-confirmed-bd);
      background: var(--tq-confirmed-bg);
    }
  </style>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'tq-bg': 'var(--tq-bg)',
            'tq-surface': 'var(--tq-surface)',
            'tq-card': 'var(--tq-card)',
            'tq-border': 'var(--tq-border)',
            'tq-border-soft': 'var(--tq-border-soft)',
            'tq-accent': 'var(--tq-accent)',
            'tq-accent-dk': 'var(--tq-accent-dk)',
            'tq-accent-dark': 'var(--tq-accent-dark)',
            'tq-accent-bg': 'var(--tq-accent-bg)',
            'tq-accent-bd': 'var(--tq-accent-bd)',
            'tq-text': 'var(--tq-text)',
            'tq-muted': 'var(--tq-muted)',
            'tq-hint': 'var(--tq-hint)',
            'tq-nav-bg': 'var(--tq-nav-bg)',
            'tq-nav-text': 'var(--tq-nav-text)',
            'tq-nav-muted': 'var(--tq-nav-muted)',
            'tq-nav-active': 'var(--tq-nav-active)',
            'tq-confirmed': 'var(--tq-confirmed)',
            'tq-confirmed-bg': 'var(--tq-confirmed-bg)',
            'tq-confirmed-bd': 'var(--tq-confirmed-bd)',
            'tq-confirmed-txt': 'var(--tq-confirmed-txt)',
            'tq-unconfirmed': 'var(--tq-unconfirmed)',
            'tq-unconf-bg': 'var(--tq-unconf-bg)',
            'tq-unconf-bd': 'var(--tq-unconf-bd)',
            'tq-unconf-txt': 'var(--tq-unconf-txt)',
            'tq-error': 'var(--tq-error)',
            'tq-error-bg': 'var(--tq-error-bg)',
            'tq-error-bd': 'var(--tq-error-bd)',
            'tq-error-txt': 'var(--tq-error-txt)',
            'tq-status-sent': 'var(--tq-status-sent)',
            'tq-status-sent-txt': 'var(--tq-status-sent-txt)',
            'tq-status-acc': 'var(--tq-status-acc)',
            'tq-status-acc-txt': 'var(--tq-status-acc-txt)',
            'tq-status-draft': 'var(--tq-status-draft)',
            'tq-status-draft-txt': 'var(--tq-status-draft-txt)',
            'tq-brand': 'var(--tq-brand)',
            'tq-border-strong': 'var(--tq-border-strong)',
            'tq-ok': 'var(--tq-ok)',
            'tq-warn': 'var(--tq-warn)',
            'tq-err': 'var(--tq-err)',
            'tq-rail-bg': 'var(--tq-rail-bg)',
          },
          borderWidth: {
            '1.5': '1.5px',
          },
          fontFamily: {
            heading: ['"Barlow Condensed"', 'sans-serif'],
            body: ['"Inter"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          borderRadius: {
            DEFAULT: '2px',
          },
          screens: {
            'fq': '900px',
          },
        },
      },
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700;800&family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- jsPDF + html2canvas (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
