# Chromium (via @sparticuz/chromium) needs runtime shared libs + fonts
# to launch headless. Without them Puppeteer fails with cryptic "Failed
# to launch the browser process" errors. Kept on one line so no TOML
# parser quirks drop any of them — the previous multi-line-with-comments
# array quietly de-serialised to ['ffmpeg'] only.

[phases.setup]
aptPkgs = ["ffmpeg", "libasound2", "libatk-bridge2.0-0", "libatk1.0-0", "libcairo2", "libcups2", "libdbus-1-3", "libdrm2", "libgbm1", "libgtk-3-0", "libnspr4", "libnss3", "libpango-1.0-0", "libxcomposite1", "libxdamage1", "libxfixes3", "libxkbcommon0", "libxrandr2", "libpangocairo-1.0-0", "libxshmfence1", "fonts-liberation", "fonts-noto-color-emoji"]

[phases.build]
cmds = ["npm install", "npm run build"]

[start]
cmd = "node server.js"
